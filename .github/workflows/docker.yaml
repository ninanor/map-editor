name: Docker
on:
  push:
    branches:
      - "*"
  pull_request:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        variant:
          - name: public
            config_branch: main
            suffix: "-readonly"
            edit: "true"
          - name: internal
            config_branch: main
            suffix: ""
            edit: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Login to registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch,suffix=${{ matrix.variant.suffix }}
            type=sha,suffix=${{ matrix.variant.suffix }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v3
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_DEFAULT_CONFIGURATION=https://s3-ext-1.nina.no/dms/maps/${{ matrix.variant.config_branch }}/maps.json
            VITE_HIDE_EDIT_BUTTON=${{ matrix.variant.edit }}
